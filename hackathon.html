<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שפיטת האקטון AI - בית מילר</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Rubik', sans-serif; }
        .podium-item { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-12">

    <header class="bg-white shadow-md border-b border-indigo-100 py-4 mb-8 sticky top-0 z-50">
        <div class="container mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <img src="https://bmiller.co.il/wp-content/uploads/2026/06/Miller-logos-01-1024x369.png" alt="בית מילר" class="h-14 object-contain">
            <div class="text-center md:text-right">
                <h1 class="text-2xl font-black text-indigo-900">שפיטת תחרות האקטון AI</h1>
                <p class="text-sm text-indigo-600 font-medium">סדנה טכנולוגית בבית מילר</p>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-8 space-y-8">
            
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                <div class="flex flex-wrap items-end gap-6">
                    <div class="flex-1 min-w-[200px]">
                        <label class="block text-sm font-bold text-slate-700 mb-2">בחר סבב תחרות:</label>
                        <select id="roundSelect" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none" onchange="changeRound()">
                        </select>
                    </div>
                    <div class="flex-[2] min-w-[300px]">
                        <label class="block text-sm font-bold text-slate-700 mb-2">הוספת קבוצה חדשה (שמות המשתתפים):</label>
                        <div class="flex gap-2">
                            <input type="text" id="memberNamesInput" placeholder="לדוגמה: ישראל, נועה ואבי..." class="flex-1 bg-slate-50 border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none">
                            <button onclick="addNewGroup()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl transition flex items-center gap-2 whitespace-nowrap cursor-pointer">
                                <i class="fas fa-plus"></i> הוסף קבוצה
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold mb-6 flex items-center gap-2 text-amber-500">
                    <i class="fas fa-trophy"></i> מובילי הסבב
                </h2>
                <div id="podiumContainer" class="flex justify-center items-end gap-4 h-56 bg-slate-50 rounded-2xl border border-slate-100 pb-4">
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                    <h2 class="font-bold text-slate-800">טבלת ניקוד סבב <span id="currentRoundLabel">1</span></h2>
                    <span class="text-xs font-medium bg-slate-200 px-2 py-1 rounded text-slate-600">עדכון חי</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-right border-collapse min-w-[750px]">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200 text-slate-500 text-sm">
                                <th class="p-4 font-bold">קבוצה</th>
                                <th class="p-4 font-bold">משתתפים</th>
                                <th class="p-4 font-bold text-center">התחלה (20%)</th>
                                <th class="p-4 font-bold text-center">סטוריבורד (20%)</th>
                                <th class="p-4 font-bold text-center">סוף (30%)</th>
                                <th class="p-4 font-bold text-center">פרומו (30%)</th>
                                <th class="p-4 font-bold text-center">ציון סופי</th>
                                <th class="p-4 font-bold">הערות</th>
                                <th class="p-4 font-bold text-center">פעולות</th>
                            </tr>
                        </thead>
                        <tbody id="resultsTableBody" class="divide-y divide-slate-100">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="lg:col-span-4">
            <div class="bg-white rounded-2xl p-6 shadow-xl border border-indigo-100 sticky top-24">
                <div id="formHeader" class="mb-6">
                    <h2 class="text-2xl font-black text-slate-900" id="judgingTitle">בחר קבוצה</h2>
                    <p class="text-indigo-600 font-medium text-sm" id="judgingMembers">ממתין לבחירה...</p>
                </div>

                <div id="judgingFormContent" class="space-y-5">
                    <div class="space-y-4">
                        <div class="bg-slate-50 p-3 rounded-xl border border-slate-200">
                            <label class="flex justify-between text-sm font-bold mb-2">
                                <span>1. תמונת התחלה (20%)</span>
                                <span class="text-indigo-600 font-bold" id="val1">1</span>
                            </label>
                            <input type="range" id="crit1" min="1" max="10" step="1" value="1" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600" oninput="updateVal('val1', this.value)">
                        </div>

                        <div class="bg-slate-50 p-3 rounded-xl border border-slate-200">
                            <label class="flex justify-between text-sm font-bold mb-2">
                                <span>2. סטוריבורד (20%)</span>
                                <span class="text-indigo-600 font-bold" id="val2">1</span>
                            </label>
                            <input type="range" id="crit2" min="1" max="10" step="1" value="1" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600" oninput="updateVal('val2', this.value)">
                        </div>

                        <div class="bg-slate-50 p-3 rounded-xl border border-slate-200">
                            <label class="flex justify-between text-sm font-bold mb-2">
                                <span>3. תמונת סוף (30%)</span>
                                <span class="text-indigo-600 font-bold" id="val3">1</span>
                            </label>
                            <input type="range" id="crit3" min="1" max="10" step="1" value="1" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600" oninput="updateVal('val3', this.value)">
                        </div>

                        <div class="bg-slate-50 p-3 rounded-xl border border-slate-200">
                            <label class="flex justify-between text-sm font-bold mb-2">
                                <span>4. סרטון פרומו (30%)</span>
                                <span class="text-indigo-600 font-bold" id="val4">1</span>
                            </label>
                            <input type="range" id="crit4" min="1" max="10" step="1" value="1" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600" oninput="updateVal('val4', this.value)">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-2 text-slate-700">הערות השופט:</label>
                        <textarea id="groupNotes" rows="3" placeholder="מה דעתך על הפרויקט?" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none text-sm"></textarea>
                    </div>

                    <button onclick="saveAndNext()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-xl transition shadow-lg flex justify-center items-center gap-3 cursor-pointer">
                        <i class="fas fa-save"></i> שמור ועבור לבא
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDlyDbpwcBcWvFnvYHb84dMEpaQFTjv-HY",
            authDomain: "tester-69fa9.firebaseapp.com",
            databaseURL: "https://tester-69fa9-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tester-69fa9",
            storageBucket: "tester-69fa9.firebasestorage.app",
            messagingSenderId: "378563229004",
            appId: "1:378563229004:web:5136b724eb84fd00e44be9",
            measurementId: "G-BFJ1QQM3MS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentRound = 1;
        let activeGroupKey = null;
        let allGroups = {};

        // Expose functions to window
        window.changeRound = changeRound;
        window.addNewGroup = addNewGroup;
        window.loadGroup = loadGroup;
        window.saveAndNext = saveAndNext;
        window.updateVal = (id, val) => document.getElementById(id).innerText = val;

        // Init
        buildRoundOptions();
        listenToData();

        function buildRoundOptions() {
            const select = document.getElementById("roundSelect");
            for (let i = 1; i <= 10; i++) {
                const opt = document.createElement("option");
                opt.value = i; opt.text = `סבב ${i}`;
                select.add(opt);
            }
        }

        function changeRound() {
            currentRound = document.getElementById("roundSelect").value;
            document.getElementById("currentRoundLabel").innerText = currentRound;
            activeGroupKey = null;
            resetForm();
            listenToData();
        }

        function listenToData() {
            const roundRef = ref(db, `hackathon/round_${currentRound}`);
            onValue(roundRef, (snapshot) => {
                allGroups = snapshot.val() || {};
                renderUI();
            });
        }

        async function addNewGroup() {
            const names = document.getElementById("memberNamesInput").value.trim();
            if (!names) return alert("אנא הזן את שמות חברי הקבוצה");

            const groupCount = Object.keys(allGroups).length + 1;
            const newGroup = {
                id: groupCount,
                name: `קבוצה ${groupCount}`,
                members: names,
                crit1: 0, crit2: 0, crit3: 0, crit4: 0,
                finalScore: 0,
                notes: ""
            };

            const roundRef = ref(db, `hackathon/round_${currentRound}`);
            const newGroupRef = push(roundRef);
            await set(newGroupRef, newGroup);
            
            document.getElementById("memberNamesInput").value = "";
            activeGroupKey = newGroupRef.key;
        }

        function renderUI() {
            const tbody = document.getElementById("resultsTableBody");
            tbody.innerHTML = "";
            
            const groupsArr = Object.entries(allGroups).map(([key, val]) => ({ key, ...val }));
            groupsArr.sort((a, b) => a.id - b.id);

            if (groupsArr.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" class="p-8 text-center text-slate-400 text-sm">אין קבוצות בסבב זה. הזן שמות משתתפים ולחץ על 'הוסף קבוצה' למעלה.</td></tr>`;
            }

            groupsArr.forEach(group => {
                const isSelected = activeGroupKey === group.key;
                const tr = document.createElement("tr");
                tr.className = `hover:bg-slate-50 transition cursor-pointer ${isSelected ? 'bg-indigo-50/80 font-medium border-l-4 border-l-indigo-600' : ''}`;
                tr.onclick = () => loadGroup(group.key);
                tr.innerHTML = `
                    <td class="p-4 font-bold text-indigo-900">${group.name}</td>
                    <td class="p-4 text-sm text-slate-600">${group.members}</td>
                    <td class="p-4 text-center text-sm font-semibold text-slate-500">${group.crit1 || 0}/10</td>
                    <td class="p-4 text-center text-sm font-semibold text-slate-500">${group.crit2 || 0}/10</td>
                    <td class="p-4 text-center text-sm font-semibold text-slate-500">${group.crit3 || 0}/10</td>
                    <td class="p-4 text-center text-sm font-semibold text-slate-500">${group.crit4 || 0}/10</td>
                    <td class="p-4 text-center"><span class="bg-indigo-100 text-indigo-700 font-bold px-3 py-1 rounded-full text-sm">${group.finalScore || 0}</span></td>
                    <td class="p-4 text-xs text-slate-500 max-w-[150px] truncate" title="${group.notes || ''}">${group.notes || '-'}</td>
                    <td class="p-4 text-center"><button class="text-indigo-600 hover:scale-110 transition"><i class="fas fa-edit"></i></button></td>
                `;
                tbody.appendChild(tr);
            });

            // Podium
            const sorted = groupsArr.filter(g => g.finalScore > 0).sort((a, b) => b.finalScore - a.finalScore);
            renderPodium(sorted);
        }

        function renderPodium(sorted) {
            const container = document.getElementById("podiumContainer");
            container.innerHTML = "";
            const layout = [ {i:1, h:'h-28', c:'bg-slate-300'}, {i:0, h:'h-40', c:'bg-amber-400'}, {i:2, h:'h-20', c:'bg-amber-600'} ];
            
            layout.forEach(slot => {
                const group = sorted[slot.i];
                const div = document.createElement("div");
                div.className = "podium-item flex flex-col items-center w-24";
                if (group) {
                    div.innerHTML = `
                        <span class="text-[10px] font-bold text-center truncate w-full px-1">${group.name}</span>
                        <span class="text-xs font-black text-indigo-600 mb-1">${group.finalScore}</span>
                        <div class="${slot.c} ${slot.h} w-full rounded-t-xl flex items-center justify-center text-white text-2xl font-black shadow-lg border border-white/10">
                            ${slot.i + 1}
                        </div>
                    `;
                } else {
                    div.innerHTML = `<div class="bg-slate-200 h-12 w-full rounded-t-xl mt-auto opacity-30 flex items-center justify-center text-slate-400 font-bold text-sm">${slot.i + 1}</div>`;
                }
                container.appendChild(div);
            });
        }

        function loadGroup(key) {
            activeGroupKey = key;
            const g = allGroups[key];
            document.getElementById("judgingTitle").innerText = g.name;
            document.getElementById("judgingMembers").innerText = g.members;
            document.getElementById("crit1").value = g.crit1 || 1;
            document.getElementById("crit2").value = g.crit2 || 1;
            document.getElementById("crit3").value = g.crit3 || 1;
            document.getElementById("crit4").value = g.crit4 || 1;
            document.getElementById("val1").innerText = g.crit1 || 1;
            document.getElementById("val2").innerText = g.crit2 || 1;
            document.getElementById("val3").innerText = g.crit3 || 1;
            document.getElementById("val4").innerText = g.crit4 || 1;
            document.getElementById("groupNotes").value = g.notes || "";
            renderUI();
        }

        async function saveAndNext() {
            if (!activeGroupKey) return alert("בחר קבוצה לשיפוט תחילה");
            
            const c1 = parseInt(document.getElementById("crit1").value);
            const c2 = parseInt(document.getElementById("crit2").value);
            const c3 = parseInt(document.getElementById("crit3").value);
            const c4 = parseInt(document.getElementById("crit4").value);
            const notes = document.getElementById("groupNotes").value;
            
            const finalScore = ((c1*0.2) + (c2*0.2) + (c3*0.3) + (c4*0.3)).toFixed(2);

            await update(ref(db, `hackathon/round_${currentRound}/${activeGroupKey}`), {
                crit1: c1, crit2: c2, crit3: c3, crit4: c4,
                notes: notes,
                finalScore: parseFloat(finalScore)
            });

            // Find next
            const keys = Object.keys(allGroups);
            const currentIndex = keys.indexOf(activeGroupKey);
            if (currentIndex < keys.length - 1) {
                loadGroup(keys[currentIndex + 1]);
            } else {
                alert("סיימת את כל הקבוצות הקיימות בסבב זה!");
            }
        }

        function resetForm() {
            document.getElementById("judgingTitle").innerText = "בחר קבוצה";
            document.getElementById("judgingMembers").innerText = "ממתין לבחירה...";
            document.getElementById("groupNotes").value = "";
        }
    </script>
</body>
</html>
